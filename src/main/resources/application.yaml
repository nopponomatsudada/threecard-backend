ktor:
  development: true
  deployment:
    port: 8080
    port: ${?PORT}
  application:
    modules:
      - com.appmaster.ApplicationKt.module

database:
  url: ${DATABASE_URL}
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  issuer: appmaster
  audience: appmaster-app
  realm: AppMaster
  accessTokenExpiration: 2592000000  # 30 days in ms
  refreshTokenExpiration: 604800000  # 7 days in ms (reserved for Phase 2)
