# Fly.io configuration for threecard-backend
# Deploy: fly deploy (from threecard-backend directory)
# Setup guide: infra/fly/README.md
#
# Public traffic reaches this app exclusively through the Cloudflare Tunnel
# established from inside the container (see infra/docker/entrypoint.sh).
# `[http_service]` is intentionally omitted so threecard-backend.fly.dev is
# not reachable from the public internet.

app = "threecard-backend"
primary_region = "nrt"  # Tokyo

[build]
  dockerfile = "infra/docker/Dockerfile"

[env]
  KTOR_DEVELOPMENT = "false"
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "15s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"  # JVM (~512MB) + cloudflared (~50MB) + headroom
