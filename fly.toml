# Fly.io configuration for threecard-backend
# Deploy: fly deploy (from threecard-backend directory)
# Setup guide: infra/fly/README.md

app = "threecard-backend"
primary_region = "nrt"  # Tokyo

[build]
  dockerfile = "infra/docker/Dockerfile"

[env]
  KTOR_DEVELOPMENT = "false"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "3s"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
